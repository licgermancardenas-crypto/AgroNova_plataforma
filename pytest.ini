[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --tb=short
    --strict-markers
    -p no:warnings
markers =
    slow: tests que demoran mas de 10s (Fact_Ventas completa)
    integration: tests que requieren conexion a base de datos
filterwarnings =
    ignore::DeprecationWarning
    ignore::FutureWarning
